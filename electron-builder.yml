appId: com.trimalaksana.erp
productName: PT.Trima Laksana Jaya Pratama
directories:
  output: release
  buildResources: build
extraResources:
  - from: public/noxtiz.ico
    to: public/noxtiz.ico
files:
  - dist/**/*
  - package.json
  - public/noxtiz.ico
  - public/noxtiz.png
  - "!node_modules/**/*"
  - "!node_modules/@capacitor/**/*"
  - "!android/**/*"
  - "!test/**/*"
  - "!scripts/**/*"
  - "!*.md"
  - "!*.config.js"
  - "!*.config.ts"
  - "!playwright.config.ts"
  - "!vitest.config.ts"
  - "!data/**/*"
win:
  target: nsis
  icon: icon.ico  # Icon di buildResources (build folder) - path relatif dari buildResources
  artifactName: "${productName} Setup ${version}.${ext}"
mac:
  target: dmg
  icon: public/noxtiz.ico  # Will be converted to .icns by electron-builder
linux:
  target: AppImage
  icon: public/noxtiz.png
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  allowElevation: true
  runAfterFinish: false
publish:
  provider: generic
  url: "https://vercel-proxy-blond-nine.vercel.app"  # Vercel Proxy untuk update check (lebih cepat)
  # Note: This URL is used when publishing updates
  # The app will check for updates at: {url}/api/updates/latest
  # Vercel proxy akan forward ke server Tailscale di backend
  # Set to null to generate latest.yml without actually publishing
  # url: null
