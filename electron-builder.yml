appId: com.trimalaksana.erp
productName: PT.Trima Laksana Jaya Pratama
directories:
  output: release
  buildResources: build
extraResources:
  - from: public/tljp.ico
    to: public/tljp.ico
  - from: build/app-update.yml
    to: app-update.yml
files:
  - dist/**/*
  - package.json
  - public/tljp.ico
  - public/noxtiz.png
  - build/app-update.yml
  - "!node_modules/**/*"
  - "!node_modules/@capacitor/**/*"
  - "!android/**/*"
  - "!test/**/*"
  - "!scripts/**/*"
  - "!*.md"
  - "!*.config.js"
  - "!*.config.ts"
  - "!playwright.config.ts"
  - "!vitest.config.ts"
  - "!data/**/*"
win:
  target: nsis
  icon: build/icon.ico  # Icon untuk installer dan shortcuts
  certificateFile: null
  certificatePassword: null
  signingHashAlgorithms:
    - sha256
  artifactName: "${productName} Setup ${version}.${ext}"
mac:
  target:
    - dmg
    - zip
  icon: public/tljp.ico
  category: public.app-category.business
  hardenedRuntime: false
  gatekeeperAssess: false
  signingIdentity: null
  identity: null
  notarize: false
  artifactName: "${productName}-${version}.${ext}"
linux:
  target: AppImage
  icon: public/noxtiz.png
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  allowElevation: true
  runAfterFinish: false
publish:
  provider: github
  owner: laflamics
  repo: trimalaksana
