version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: trimalaksana-postgres
    environment:
      POSTGRES_USER: trimalaksana
      POSTGRES_PASSWORD: your_secure_password
      POSTGRES_DB: trimalaksana_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trimalaksana"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: trimalaksana-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: your_secure_password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/minio_data
    command: server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: trimalaksana-api
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: trimalaksana
      DB_PASSWORD: your_secure_password
      DB_NAME: trimalaksana_db
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: your_secure_password
      MINIO_USE_SSL: "false"
      API_PORT: 8080
      CORS_ORIGIN: "http://localhost:5173,http://localhost:3000"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data:
