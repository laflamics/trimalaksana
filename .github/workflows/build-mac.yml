name: Build Mac App

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-mac:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Mac app
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          SKIP_NOTARIZATION: true
        run: npm run build:app:mac:fast

      - name: Get version
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Create Release and Upload DMG
        uses: softprops/action-gh-release@v2
        with:
          tag_name: mac-${{ steps.version.outputs.version }}
          name: Mac Build v${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          files: |
            release-build/*.dmg
            release-build/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
