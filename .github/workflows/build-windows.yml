name: Build Windows App

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Update build version
        run: node scripts/update-build-version.js

      - name: Build app (renderer + main)
        run: npm run build:all

      - name: Build Windows app with electron-builder
        env:
          GH_TOKEN: ${{ secrets.TLJP }}
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npx electron-builder --win --x64 --publish never

      - name: Upload EXE to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Windows Build ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: |
            release-build/*.exe
            release-build/latest.yml
        env:
          GITHUB_TOKEN: ${{ secrets.TLJP }}
