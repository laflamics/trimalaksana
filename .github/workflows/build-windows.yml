name: Build Windows App

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build app (renderer + main)
        run: npm run build:all

      - name: Build Windows app with electron-builder
        env:
          GH_TOKEN: ${{ secrets.TLJP }}
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npx cross-env CSC_IDENTITY_AUTO_DISCOVERY=false electron-builder --win --x64 --publish always
